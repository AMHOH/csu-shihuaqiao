<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="bridge-api-base" content="" />
  <meta name="bridge-cloudbase-env" content="csu-shihuaqiao-d9gqtwfxsd06338ec" />
  <meta name="bridge-cloudbase-region" content="ap-shanghai" />
  <meta name="bridge-cloudbase-function" content="bridge-api" />
  <meta name="bridge-admin-emails" content="" />
  <title>诗话桥 / 诗画桥 内容档案</title>
  <link rel="stylesheet" href="https://unpkg.com/@wangeditor/editor@5.1.23/dist/css/style.css" />
  <link rel="stylesheet" href="./styles.css?v=wangeditor-20260614" />
</head>

<body>
  <section id="landingView" class="landing-view" aria-label="导航页">
    <div class="landing-shell">
      <blockquote class="landing-poem">
        <p>桥是土地与土地的连系；</p>
        <p>桥是河流与道路的爱情；</p>
        <p>桥是船只与车辆点头致敬的驿站；</p>
        <p>桥是乘船与步行者挥手告别的地方。</p>
        <footer>——艾青《桥》</footer>
      </blockquote>
      <button class="landing-cta" type="button" data-route="archive">探索诗话桥</button>
    </div>
  </section>

  <header id="appHeader" class="hero" hidden>
    <div class="hero__shade"></div>
    <button id="backHomeButton" class="back-home" type="button" aria-label="返回导航页">←</button>
    <nav class="site-nav" aria-label="主导航">
      <button class="nav-link is-active" type="button" data-route="archive">内容档案</button>
      <button class="nav-link" type="button" data-route="publish">发布内容</button>
    </nav>
    <section class="hero__content" aria-labelledby="page-title">
      <h2 id="page-title">诗话桥课程档案</h2>
      <p class="hero__intro">
        采集关键词：诗话桥 / 诗画桥。汇总文章、视频与社交讨论。
      </p>
    </section>
  </header>

  <main id="appMain" hidden>
    <section id="archiveView" class="view is-active" aria-label="内容档案">
      <section class="toolbar" aria-label="内容筛选">
        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、摘要、作者" autocomplete="off" />
        </label>

        <div class="control-group" role="group" aria-label="平台">
          <button class="chip is-active" data-filter="platform" data-value="all">全部平台</button>
          <button class="chip" data-filter="platform" data-value="wechat-search">微信公众号</button>
          <button class="chip" data-filter="platform" data-value="csu-bridge-center">中南大学古桥研究中心</button>
          <button class="chip" data-filter="platform" data-value="site-homework">站内资源</button>
          <button class="chip" data-filter="platform" data-value="bilibili">B站</button>
          <button class="chip" data-filter="platform" data-value="weibo">微博</button>
        </div>

        <div class="control-row">
          <div class="segmented" role="group" aria-label="内容类型">
            <button class="segment is-active" data-filter="type" data-value="all">全部</button>
            <button class="segment" data-filter="type" data-value="article">文章</button>
            <button class="segment" data-filter="type" data-value="file">文件</button>
            <button class="segment" data-filter="type" data-value="video">视频</button>
          </div>

          <label class="select-label">
            <span>排序</span>
            <select id="sortSelect">
              <option value="newest">最新优先</option>
              <option value="oldest">最早优先</option>
            </select>
          </label>
        </div>
      </section>

      <section class="stats" aria-label="内容概览">
        <div>
          <strong id="totalCount">0</strong>
          <span>条内容</span>
        </div>
        <div>
          <strong id="articleCount">0</strong>
          <span>文章</span>
        </div>
        <div>
          <strong id="videoCount">0</strong>
          <span>视频</span>
        </div>
        <div>
          <strong id="sourceCount">0</strong>
          <span>个平台</span>
        </div>
      </section>

      <section class="results-head" aria-label="结果统计">
        <p id="resultMeta">正在载入...</p>
      </section>

      <section id="contentGrid" class="content-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" hidden>当前没有满足条件的内容</p>
    </section>

    <section id="authView" class="view auth-view" aria-labelledby="authTitle" hidden>
      <div class="auth-panel">
        <h2 id="authTitle">内容发布</h2>
        <p class="auth-copy">输入邮箱获取验证码，首次登录会自动创建账号。</p>
        <p class="auth-switch-copy" id="authSwitchCopy">管理员权限由云函数和数据库判断。</p>

        <form id="authForm" class="auth-form">
          <label class="field">
            <span>邮箱</span>
            <input id="authEmail" name="email" type="email" placeholder="请输入邮箱" autocomplete="email" required />
          </label>

          <label class="field">
            <span>验证码</span>
            <div class="code-row">
              <input id="authCode" name="code" type="text" inputmode="numeric" pattern="[0-9]{4,8}"
                placeholder="请输入邮箱验证码" autocomplete="one-time-code" required />
              <button id="sendCodeButton" class="secondary-action code-button" type="button">获取验证码</button>
            </div>
          </label>

          <p id="authMessage" class="form-message" aria-live="polite"></p>
          <button id="authSubmit" class="form-submit" type="submit">登录 / 注册</button>
        </form>
        <button class="back-link" type="button" data-route="archive">返回内容档案</button>
      </div>
    </section>

    <section id="publishView" class="view publish-view" aria-labelledby="publishTitle" hidden>
      <form id="publishForm" class="publish-panel">
        <div class="form-head">
          <h2 id="publishTitle">发布作业展示</h2>
          <p id="publishHint">普通用户提交后会进入管理员审核，通过后才会公开展示。</p>
        </div>

        <div class="segmented publish-kind-toggle" role="group" aria-label="发布类型">
          <button class="segment is-active" type="button" data-publish-kind="article">上传文章</button>
          <button class="segment" type="button" data-publish-kind="file">上传文件</button>
        </div>
        <input id="publishKind" name="contentKind" type="hidden" value="article" />

        <label class="field">
          <span>标题</span>
          <input id="publishTitleInput" name="title" type="text" autocomplete="off" required />
        </label>

        <label class="field">
          <span>上传者</span>
          <input id="uploaderNameInput" name="uploaderName" type="text" autocomplete="name" placeholder="建议格式：专业班级-姓名" required />
        </label>

        <div id="articleFields" class="publish-kind-panel">
          <div class="field">
            <span>正文内容</span>
            <div class="rich-editor-shell">
              <div id="articleToolbar" class="editor-toolbar" aria-label="正文编辑工具"></div>
              <div id="articleEditor" class="rich-editor"></div>
            </div>
          </div>
        </div>

        <div id="fileFields" class="publish-kind-panel" hidden>
          <label class="field file-field">
            <span>文件</span>
            <input id="documentFileInput" name="documentFile" type="file"
              accept=".ppt,.pptx,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" />
            <small>支持 PPT、PDF、Word，文件大小不超过 100MB。</small>
          </label>
        </div>

        <p id="publishMessage" class="form-message" aria-live="polite"></p>
        <div class="form-actions">
          <button id="publishSubmit" class="form-submit" type="submit">提交审核</button>
          <button id="logoutButton" class="secondary-action" type="button">退出登录</button>
        </div>
      </form>

      <section id="reviewPanel" class="review-panel" aria-labelledby="reviewTitle" hidden>
        <div class="form-head">
          <h2 id="reviewTitle">待审核内容</h2>
          <p id="reviewMeta">正在载入...</p>
        </div>
        <div class="admin-manage-zone">
          <button class="secondary-action manage-entry" type="button" data-route="manage-site">修改站内上传内容</button>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </section>

    <section id="manageSiteView" class="view manage-site-view" aria-labelledby="manageSiteTitle" hidden>
      <section class="review-panel manage-panel">
        <div class="form-head">
          <h2 id="manageSiteTitle">修改站内上传内容</h2>
          <p id="manageSiteMeta">正在载入...</p>
        </div>
        <div class="manage-toolbar">
          <button class="secondary-action" type="button" data-route="publish">返回发布内容</button>
        </div>
        <div id="manageSiteList" class="manage-list"></div>
      </section>
    </section>
  </main>

  <section id="detailDialog" class="detail-dialog" hidden aria-labelledby="detailTitle">
    <div class="detail-panel">
      <button id="detailCloseButton" class="detail-close" type="button" aria-label="关闭">×</button>
      <div class="item-card__meta detail-meta">
        <span id="detailPlatform" class="platform-pill"></span>
        <span id="detailType" class="type-pill"></span>
        <time id="detailDate"></time>
      </div>
      <h2 id="detailTitle"></h2>
      <article id="detailBody" class="detail-body"></article>
      <div id="detailFiles" class="detail-files"></div>
    </div>
  </section>

  <template id="itemTemplate">
    <article class="item-card">
      <div class="item-card__meta">
        <span class="platform-pill"></span>
        <span class="type-pill"></span>
        <span class="category-pill" hidden></span>
        <time></time>
      </div>
      <h3></h3>
      <p class="summary"></p>
      <p class="item-uploader" hidden></p>
      <div class="item-tags" aria-label="内容标签"></div>
      <div class="item-card__footer">
        <a class="source-link" target="_blank" rel="noreferrer">查看原文</a>
      </div>
    </article>
  </template>

  <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
  <script src="https://unpkg.com/@wangeditor/editor@5.1.23/dist/index.js"></script>
  <script src="./app.js?v=auth-refresh-20260615" defer></script>
</body>

</html>
